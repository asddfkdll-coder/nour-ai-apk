name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install dependencies
      run: pnpm install
      
    - name: Remove PWA plugin
      run: |
        sed -i 's/import { VitePWA } from .vite-plugin-pwa.//' vite.config.ts
        sed -i 's/VitePWA({//' vite.config.ts
        sed -i 's/}),//' vite.config.ts
      
    - name: Build web
      run: pnpm build
      
    - name: Sync Android
      run: npx cap sync android
      
    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: nour-ai-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
